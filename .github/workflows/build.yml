name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      # Node.js 백엔드 빌드
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build

      # pkg로 Node.js 백엔드 → 단독 EXE (Node.js 설치 불필요)
      - name: Build server EXE with pkg
        run: npx @yao-pkg/pkg dist/index.js --target node20-win-x64 --output server.exe --compress GZip

      # Python + PyInstaller
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install pyinstaller

      # GUI EXE 빌드
      - name: Build GUI EXE
        run: >
          pyinstaller --noconfirm --onefile --windowed
          --name "StandX_Hedge_Bot"
          gui.py

      # 배포 패키지: GUI EXE + server EXE + public/ 만 필요
      - name: Prepare release
        shell: bash
        run: |
          mkdir -p release/StandX_Hedge_Bot
          cp dist/StandX_Hedge_Bot.exe release/StandX_Hedge_Bot/
          cp server.exe release/StandX_Hedge_Bot/
          cp -r dist/public release/StandX_Hedge_Bot/public 2>/dev/null || true

      - name: ZIP package
        shell: bash
        run: |
          cd release
          7z a -tzip ../StandX_Hedge_Bot_Windows.zip StandX_Hedge_Bot/

      - uses: actions/upload-artifact@v4
        with:
          name: win-x64
          path: StandX_Hedge_Bot_Windows.zip

  release:
    needs: [build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
